<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuesto Pro - mis-finanzas-app</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
        }
        .glass-nav { 
            background: rgba(15, 23, 42, 0.98); 
            backdrop-filter: blur(20px); 
        }
        .animate-slide-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        input, button, select { font-size: 16px !important; }
        .nav-text { font-size: 10px !important; letter-spacing: 0.05em; font-weight: 800; }
        .category-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged, 
            signOut, 
            signInAnonymously, 
            signInWithCustomToken,
            GoogleAuthProvider,
            signInWithPopup,
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            collection, 
            onSnapshot, 
            addDoc, 
            deleteDoc, 
            serverTimestamp, 
            setDoc 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURACIÓN DE TU FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyAa3q8bjV6MlX5bohw-CHxBAPhLWmkroto",
            authDomain: "mis-finanzas-app-bc5f2.firebaseapp.com",
            projectId: "mis-finanzas-app-bc5f2",
            storageBucket: "mis-finanzas-app-bc5f2.firebasestorage.app",
            messagingSenderId: "77457349019",
            appId: "1:77457349019:web:adc015006b0945325fe93e"
        };

        const APP_ID = 'mis-finanzas-app-bc5f2';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const DEFAULT_SUBS = {
            'Necesidad': ['Alquiler', 'Super', 'Servicios', 'Transporte', 'Salud'],
            'Ocio': ['Restaurantes', 'Cine', 'Viajes', 'Suscripciones'],
            'Ahorro': ['Inversión', 'Fondo Emergencia', 'Ahorro Retiro']
        };

        // --- UTILIDADES ---
        const UTILS = {
            formatCurrency: (val) => `$${Number(val).toLocaleString('es-ES')}`,
            toMonthKey: (date) => {
                const d = new Date(date);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            },
            formatFriendlyDate: (val) => {
                if (!val) return "";
                const d = typeof val === 'string' ? new Date(val + 'T12:00:00') : (val.toDate ? val.toDate() : new Date(val));
                return d.toLocaleDateString('es-ES', { day: '2-digit', month: 'short' });
            }
        };

        // --- HOOK DE AUTENTICACIÓN ---
        function useAuth() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [authError, setAuthError] = useState(null);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        // REGLA 3: Intentar autenticación con token solo si está presente y es válido
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } catch (tokenError) {
                                // Si el token falla (mismatch), no bloqueamos la app, dejamos que el usuario use login manual
                                console.warn("Custom token failed, falling back to manual auth state.");
                            }
                        }
                    } catch (e) {
                        console.error("Auth init error:", e);
                    }
                };

                initAuth();
                
                const unsubscribe = onAuthStateChanged(auth, (u) => { 
                    setUser(u); 
                    setLoading(false); 
                });

                return () => unsubscribe();
            }, []);

            const loginGoogle = async () => {
                const provider = new GoogleAuthProvider();
                try {
                    setAuthError(null);
                    await signInWithPopup(auth, provider);
                } catch (e) {
                    console.error(e);
                    setAuthError("No se pudo iniciar sesión con Google.");
                }
            };

            const loginEmail = async (email, password, isRegister) => {
                try {
                    setAuthError(null);
                    if (isRegister) {
                        await createUserWithEmailAndPassword(auth, email, password);
                    } else {
                        await signInWithEmailAndPassword(auth, email, password);
                    }
                } catch (e) {
                    console.error(e);
                    setAuthError(isRegister ? "Error al crear cuenta." : "Correo o contraseña incorrectos.");
                }
            };

            return { user, loading, authError, loginGoogle, loginEmail };
        }

        // --- HOOK DE DATOS FINANCIEROS (FIRESTORE) ---
        function useFinance(user, monthKey) {
            const [raw, setRaw] = useState({ incomes: [], expenses: [], config: DEFAULT_SUBS });

            useEffect(() => {
                // REGLA 3: Guardar operaciones con if (!user) return;
                if (!user) return;
                
                // REGLA 1: Usar rutas estrictas
                const userPath = ['artifacts', APP_ID, 'users', user.uid];
                
                const unsubIncomes = onSnapshot(collection(db, ...userPath, 'ingresos'), 
                    s => setRaw(p => ({...p, incomes: s.docs.map(d => ({id: d.id, ...d.data()}))})),
                    (e) => console.error("Firestore error (incomes):", e)
                );

                const unsubExpenses = onSnapshot(collection(db, ...userPath, 'gastos'), 
                    s => setRaw(p => ({...p, expenses: s.docs.map(d => ({id: d.id, ...d.data()}))})),
                    (e) => console.error("Firestore error (expenses):", e)
                );

                const unsubConfig = onSnapshot(doc(db, ...userPath, 'config', 'subcategories'), 
                    d => { if (d.exists()) setRaw(p => ({...p, config: d.data().mapping})); },
                    (e) => console.error("Firestore error (config):", e)
                );

                return () => { unsubIncomes(); unsubExpenses(); unsubConfig(); };
            }, [user]);

            const filtered = useMemo(() => {
                const filterFn = (i) => UTILS.toMonthKey(i.date || new Date()) === monthKey;
                return { 
                    incomes: raw.incomes.filter(filterFn), 
                    expenses: raw.expenses.filter(filterFn) 
                };
            }, [raw, monthKey]);

            const totals = useMemo(() => {
                const inc = filtered.incomes.reduce((a, b) => a + Number(b.amount), 0);
                const cats = filtered.expenses.reduce((a, b) => {
                    a[b.category] = (a[b.category] || 0) + Number(b.amount);
                    return a;
                }, { Necesidad: 0, Ocio: 0, Ahorro: 0 });
                const exp = (cats.Necesidad || 0) + (cats.Ocio || 0) + (cats.Ahorro || 0);
                return { totalIncome: inc, totalExpense: exp, balance: inc - exp, ...cats };
            }, [filtered]);

            const actions = {
                add: (col, item) => {
                    if (!user) return;
                    return addDoc(collection(db, 'artifacts', APP_ID, 'users', user.uid, col), { ...item, createdAt: serverTimestamp() });
                },
                remove: (col, id) => {
                    if (!user) return;
                    return deleteDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, col, id));
                },
                updateConfig: (mapping) => {
                    if (!user) return;
                    return setDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'config', 'subcategories'), { mapping });
                }
            };

            return { data: filtered, totals, config: raw.config, actions };
        }

        // --- COMPONENTES UI ---
        const Card = ({ children, className = "" }) => (
            React.createElement('div', { className: `bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 ${className}` }, children)
        );

        const Button = ({ children, variant = "primary", className = "", icon, ...props }) => {
            const themes = {
                primary: "bg-indigo-600 text-white shadow-md",
                secondary: "bg-slate-100 text-slate-600",
                danger: "bg-red-500 text-white",
                success: "bg-emerald-600 text-white",
                outline: "border-2 border-slate-200 text-slate-600 bg-white"
            };
            return React.createElement('button', { 
                ...props, 
                className: `flex items-center justify-center gap-3 py-4 px-6 rounded-2xl font-bold uppercase text-[10px] tracking-widest transition-all active:scale-95 ${themes[variant]} ${className}` 
            }, 
                icon && React.createElement('span', { className: "text-base" }, icon),
                children
            );
        };

        const Input = ({ label, ...props }) => (
            React.createElement('div', { className: "w-full space-y-2" },
                label && React.createElement('label', { className: "text-[10px] uppercase font-black text-slate-400 ml-1" }, label),
                React.createElement('input', { ...props, className: "w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 outline-none font-bold text-slate-800" })
            )
        );

        // --- VISTA LOGIN ---
        const LoginView = ({ onGoogle, onEmail, error }) => {
            const [isRegister, setIsRegister] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            return React.createElement('div', { className: "min-h-screen flex flex-col justify-center p-8 animate-slide-up bg-slate-50" },
                React.createElement('div', { className: "mb-12 text-center" },
                    React.createElement('div', { className: "w-20 h-20 bg-indigo-600 rounded-[2rem] flex items-center justify-center text-white text-4xl mb-6 mx-auto shadow-xl shadow-indigo-100" }, "🛡️"),
                    React.createElement('h1', { className: "text-3xl font-black text-slate-900 tracking-tighter" }, "Acceso Seguro"),
                    React.createElement('p', { className: "text-slate-400 font-bold text-sm mt-2" }, "Gestiona tus finanzas en mis-finanzas-app")
                ),

                React.createElement('div', { className: "space-y-4" },
                    React.createElement(Input, { label: "Correo Electrónico", type: "email", value: email, onChange: e => setEmail(e.target.value), placeholder: "tu@correo.com" }),
                    React.createElement(Input, { label: "Contraseña", type: "password", value: password, onChange: e => setPassword(e.target.value), placeholder: "••••••••" }),
                    
                    error && React.createElement('div', { className: "p-4 bg-red-50 text-red-500 rounded-2xl text-[11px] font-bold text-center border border-red-100" }, error),

                    React.createElement(Button, { 
                        className: "w-full mt-4", 
                        onClick: () => onEmail(email, password, isRegister) 
                    }, isRegister ? "Registrarse" : "Entrar"),

                    React.createElement('div', { className: "flex items-center gap-4 py-4" },
                        React.createElement('div', { className: "h-[1px] flex-1 bg-slate-200" }),
                        React.createElement('span', { className: "text-[10px] font-black text-slate-300 uppercase" }, "O"),
                        React.createElement('div', { className: "h-[1px] flex-1 bg-slate-200" })
                    ),

                    React.createElement(Button, { 
                        variant: "outline", 
                        className: "w-full", 
                        onClick: onGoogle,
                        icon: "🌐"
                    }, "Continuar con Google"),

                    React.createElement('button', { 
                        onClick: () => setIsRegister(!isRegister),
                        className: "w-full text-center text-[10px] font-black text-indigo-500 uppercase mt-4 tracking-widest"
                    }, isRegister ? "¿Ya tienes cuenta? Login" : "¿No tienes cuenta? Únete gratis")
                )
            );
        };

        // --- DASHBOARD COMPONENT ---
        const Dashboard = ({ totals }) => (
            React.createElement('div', { className: "space-y-4" },
                React.createElement('div', { className: "bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl mb-6" },
                    React.createElement('p', { className: "text-[10px] uppercase font-black opacity-60 mb-1" }, "Balance Actual"),
                    React.createElement('h2', { className: "text-5xl font-black tracking-tighter" }, UTILS.formatCurrency(totals.balance)),
                    React.createElement('div', { className: "mt-8 pt-6 border-t border-white/10 flex justify-between" },
                        React.createElement('div', null,
                            React.createElement('p', { className: "text-[9px] uppercase font-black opacity-40" }, "Ingresos"),
                            React.createElement('p', { className: "font-bold text-emerald-300" }, UTILS.formatCurrency(totals.totalIncome))
                        ),
                        React.createElement('div', { className: "text-right" },
                            React.createElement('p', { className: "text-[9px] uppercase font-black opacity-40" }, "Gastos"),
                            React.createElement('p', { className: "font-bold text-red-200" }, UTILS.formatCurrency(totals.totalExpense))
                        )
                    )
                ),
                React.createElement(MetricCard, { label: "Necesidades (50%)", amount: totals.Necesidad || 0, total: totals.totalIncome, color: "bg-indigo-500", percentage: 0.5 }),
                React.createElement(MetricCard, { label: "Deseos y Ocio (30%)", amount: totals.Ocio || 0, total: totals.totalIncome, color: "bg-orange-400", percentage: 0.3 }),
                React.createElement(MetricCard, { label: "Ahorro e Inv. (20%)", amount: totals.Ahorro || 0, total: totals.totalIncome, color: "bg-emerald-500", percentage: 0.2 })
            )
        );

        const MetricCard = ({ label, amount, total, color, percentage }) => {
            const limit = total * percentage;
            const ratio = limit > 0 ? (amount / limit) : 0;
            return React.createElement(Card, { className: "mb-4 animate-slide-up" },
                React.createElement('div', { className: "flex justify-between items-end mb-3" },
                    React.createElement('div', null,
                        React.createElement('p', { className: "text-[10px] font-black text-slate-400 uppercase" }, label),
                        React.createElement('p', { className: "text-[10px] text-slate-300 font-bold" }, `Límite: ${UTILS.formatCurrency(limit)}`)
                    ),
                    React.createElement('p', { className: "text-lg font-black text-slate-900" }, UTILS.formatCurrency(amount))
                ),
                React.createElement('div', { className: "h-2 bg-slate-100 rounded-full overflow-hidden" },
                    React.createElement('div', { 
                        className: `h-full transition-all duration-700 ${amount > limit && percentage < 1 ? 'bg-red-500' : color}`, 
                        style: { width: `${Math.min(ratio * 100, 100)}%` } 
                    })
                )
            );
        };

        // --- APP ROOT ---
        function App() {
            const { user, loading, authError, loginGoogle, loginEmail } = useAuth();
            const [view, setView] = useState('dashboard');
            const [month, setMonth] = useState(UTILS.toMonthKey(new Date()));
            const { data, totals, config, actions } = useFinance(user, month);

            if (loading) return React.createElement('div', { className: "h-screen flex items-center justify-center font-black text-indigo-600 text-[10px] uppercase tracking-widest" }, "Conectando...");

            if (!user) return React.createElement(LoginView, { onGoogle: loginGoogle, onEmail: loginEmail, error: authError });

            return React.createElement('div', { className: "max-w-md mx-auto p-6 pb-32 min-h-screen" },
                React.createElement('header', { className: "flex justify-between items-center py-6" },
                    React.createElement('div', null,
                        React.createElement('h1', { className: "text-xl font-black text-slate-900 uppercase tracking-tighter leading-none" }, "Finanzas"),
                        React.createElement('p', { className: "text-[9px] font-black text-indigo-500 uppercase mt-1" }, user.email?.split('@')[0] || 'Mi Cuenta')
                    ),
                    React.createElement('button', { 
                        onClick: () => signOut(auth), 
                        className: "text-[9px] font-black text-slate-300 uppercase hover:text-red-400 transition-colors" 
                    }, "Salir")
                ),

                React.createElement('div', { className: "mb-8" },
                    React.createElement('select', { 
                        value: month, onChange: e => setMonth(e.target.value),
                        className: "w-full bg-white border-2 border-slate-100 rounded-3xl p-5 font-black uppercase text-xs shadow-sm outline-none appearance-none text-center"
                    }, Array.from({length: 12}, (_, i) => {
                        const d = new Date(); d.setMonth(d.getMonth() - i);
                        const k = UTILS.toMonthKey(d);
                        return React.createElement('option', { key: k, value: k }, d.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' }));
                    }))
                ),

                view === 'dashboard' && React.createElement(Dashboard, { totals }),
                view === 'incomes' && React.createElement('div', { className: "space-y-4" }, 
                    React.createElement(Card, null, React.createElement('p', { className: "text-center font-bold text-slate-400 py-4" }, "Sección de Ingresos"))
                ),
                view === 'add' && React.createElement('div', { className: "space-y-4" },
                    React.createElement(Card, null, React.createElement('p', { className: "text-center font-bold text-slate-400 py-4" }, "Sección de Gastos"))
                ),

                React.createElement('nav', { className: "fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] glass-nav rounded-[2.5rem] p-2 flex justify-between shadow-2xl z-50 border border-slate-700/50" },
                    [['dashboard', '🏠', 'Inicio'], ['incomes', '💰', 'Plus'], ['add', '➕', 'Gasto'], ['config', '⚙️', 'Editar']].map(([v, i, l]) => (
                        React.createElement('button', { 
                            key: v, onClick: () => setView(v), 
                            className: `flex flex-col items-center flex-1 py-3 transition-all rounded-[1.8rem] ${view === v ? 'bg-white/10 text-indigo-300' : 'text-slate-500'}` 
                        },
                            React.createElement('span', { className: "text-xl mb-1" }, i),
                            React.createElement('span', { className: "nav-text" }, l)
                        )
                    ))
                )
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
