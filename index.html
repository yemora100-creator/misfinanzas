<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuesto Pro - Arquitectura Limpia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-nav { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.4s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, onAuthStateChanged, signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, 
            signOut, signInAnonymously, signInWithCustomToken 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, doc, collection, onSnapshot, addDoc, deleteDoc, serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURACIÓN Y CONSTANTES ---
        const APP_ID = typeof window.__app_id !== 'undefined' ? window.__app_id : 'presupuesto-v1';
        const firebaseConfig = JSON.parse(window.__firebase_config);

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- HOOKS PERSONALIZADOS (Lógica de Negocio) ---
        function useFinanceData(user) {
            const [incomeList, setIncomeList] = useState([]);
            const [expenses, setExpenses] = useState([]);

            useEffect(() => {
                // REGLA 3: Solo consultar si el usuario está autenticado
                if (!user) return;

                // REGLA 1: Usar rutas estrictas /artifacts/{appId}/users/{userId}/{collectionName}
                const incomesRef = collection(db, 'artifacts', APP_ID, 'users', user.uid, 'ingresos');
                const expensesRef = collection(db, 'artifacts', APP_ID, 'users', user.uid, 'gastos');

                const unsubIncomes = onSnapshot(incomesRef, 
                    (snap) => setIncomeList(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
                    (err) => console.error("Error ingresos:", err)
                );

                const unsubExpenses = onSnapshot(expensesRef, 
                    (snap) => setExpenses(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
                    (err) => console.error("Error gastos:", err)
                );

                return () => { unsubIncomes(); unsubExpenses(); };
            }, [user]);

            const totalIncome = useMemo(() => incomeList.reduce((acc, curr) => acc + Number(curr.amount || 0), 0), [incomeList]);
            
            const totals = useMemo(() => {
                const catTotals = { Necesidad: 0, Ocio: 0, Ahorro: 0 };
                expenses.forEach(e => { if (catTotals[e.category] !== undefined) catTotals[e.category] += Number(e.amount); });
                return { ...catTotals, totalSpent: catTotals.Necesidad + catTotals.Ocio + catTotals.Ahorro };
            }, [expenses]);

            return { incomeList, expenses, totalIncome, totals };
        }

        // --- COMPONENTES DE UI ---

        const NavBtn = ({ active, onClick, icon, label }) => (
            React.createElement('button', { onClick, className: `flex flex-col items-center gap-1 p-3 transition-all ${active ? 'text-indigo-400 scale-110' : 'text-slate-500 opacity-60'}` },
                React.createElement('span', { className: "text-xl" }, icon),
                React.createElement('span', { className: "text-[8px] font-black uppercase tracking-tighter" }, label)
            )
        );

        const StatCard = ({ label, amount, goal, color }) => {
            const perc = goal > 0 ? Math.min(Math.round((amount / goal) * 100), 100) : 0;
            return React.createElement('div', { className: "bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100" },
                React.createElement('div', { className: "flex justify-between mb-2 items-end font-bold" },
                    React.createElement('span', { className: "text-[10px] uppercase text-slate-400 font-black" }, label),
                    React.createElement('span', { className: "text-sm text-slate-800 font-black" }, `$${amount.toLocaleString()}`)
                ),
                React.createElement('div', { className: "h-2 bg-slate-100 rounded-full overflow-hidden" },
                    React.createElement('div', { className: `h-full ${color} transition-all duration-700`, style: { width: `${perc}%` } })
                )
            );
        };

        const LoginScreen = ({ onGoogle, onEmailAuth, onGuest }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegister, setIsRegister] = useState(false);
            const [msg, setMsg] = useState(null);
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setMsg(null);
                try {
                    await onEmailAuth(isRegister, email, password);
                } catch (err) {
                    setMsg("Error de autenticación. Verifica tus credenciales.");
                } finally {
                    setLoading(false);
                }
            };

            return React.createElement('div', { className: "h-screen flex items-center justify-center p-6 bg-slate-50" },
                React.createElement('div', { className: "bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm space-y-6" },
                    React.createElement('div', { className: "text-center" },
                        React.createElement('div', { className: "w-16 h-16 bg-indigo-600 rounded-3xl mx-auto flex items-center justify-center text-2xl shadow-xl shadow-indigo-100 mb-4" }, "🚀"),
                        React.createElement('h2', { className: "text-2xl font-black text-slate-900 uppercase tracking-tighter" }, isRegister ? "Crear Cuenta" : "Bienvenido"),
                        React.createElement('p', { className: "text-[10px] text-slate-400 font-black mt-1 uppercase" }, "Finanzas bajo control")
                    ),
                    React.createElement('form', { onSubmit: handleSubmit, className: "space-y-3 font-bold" },
                        React.createElement('input', { type: "email", placeholder: "Correo electrónico", value: email, onChange: e => setEmail(e.target.value), className: "w-full p-4 bg-slate-50 rounded-2xl outline-none text-sm border-2 border-transparent focus:border-indigo-500 font-bold", required: true }),
                        React.createElement('input', { type: "password", placeholder: "Contraseña", value: password, onChange: e => setPassword(e.target.value), className: "w-full p-4 bg-slate-50 rounded-2xl outline-none text-sm border-2 border-transparent focus:border-indigo-500 font-bold", required: true }),
                        msg && React.createElement('p', { className: "text-[10px] text-red-500 uppercase text-center font-black p-2 bg-red-50 rounded-lg" }, msg),
                        React.createElement('button', { type: "submit", disabled: loading, className: "w-full py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-[10px] shadow-lg disabled:opacity-50" }, 
                            loading ? "Procesando..." : (isRegister ? "Registrarse" : "Entrar")
                        )
                    ),
                    React.createElement('div', { className: "grid grid-cols-2 gap-2" },
                        React.createElement('button', { onClick: onGoogle, className: "py-3 bg-white border-2 border-slate-100 rounded-2xl font-black uppercase text-[10px] flex items-center justify-center gap-2" },
                            React.createElement('img', { src: "https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg", className: "w-3 h-3" }), "Google"
                        ),
                        React.createElement('button', { onClick: onGuest, className: "py-3 bg-slate-100 rounded-2xl font-black uppercase text-[10px]" }, "Invitado")
                    ),
                    React.createElement('button', { onClick: () => setIsRegister(!isRegister), className: "w-full text-[9px] text-slate-400 uppercase font-black" }, 
                        isRegister ? "¿Ya tienes cuenta? Inicia sesión" : "¿No tienes cuenta? Regístrate"
                    )
                )
            );
        };

        // --- COMPONENTE PRINCIPAL ---
        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const { incomeList, expenses, totalIncome, totals } = useFinanceData(user);

            useEffect(() => {
                // REGLA 3: Inicializar Auth correctamente
                const initAuth = async () => {
                    try {
                        if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                            await signInWithCustomToken(auth, window.__initial_auth_token);
                        }
                    } catch (e) {
                        console.error("Auth Init Error:", e);
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleGoogleAuth = async () => {
                const provider = new GoogleAuthProvider();
                try { 
                    await signInWithPopup(auth, provider); 
                } catch(e) { 
                    // Fallback si el dominio no está autorizado
                    console.error("Dominio no autorizado para Google Auth. Usando anónimo...");
                    await signInAnonymously(auth);
                }
            };

            const handleEmailAuth = async (isRegister, email, password) => {
                if (isRegister) await createUserWithEmailAndPassword(auth, email, password);
                else await signInWithEmailAndPassword(auth, email, password);
            };

            const handleGuestAuth = () => signInAnonymously(auth);

            const addData = async (col, data) => {
                if (!user) return;
                await addDoc(collection(db, 'artifacts', APP_ID, 'users', user.uid, col), { 
                    ...data, 
                    amount: Number(data.amount), 
                    createdAt: serverTimestamp() 
                });
            };

            const deleteData = async (col, id) => {
                if (!user) return;
                await deleteDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, col, id));
            };

            if (loading) return React.createElement('div', { className: "h-screen flex items-center justify-center font-black text-indigo-600 animate-pulse" }, "INICIANDO...");
            
            if (!user) return React.createElement(LoginScreen, { 
                onGoogle: handleGoogleAuth, 
                onEmailAuth: handleEmailAuth,
                onGuest: handleGuestAuth
            });

            return React.createElement('div', { className: "max-w-md mx-auto p-4 pb-28 min-h-screen text-slate-800" },
                React.createElement('header', { className: "flex justify-between items-center py-6" },
                    React.createElement('div', null,
                        React.createElement('h1', { className: "text-2xl font-black text-slate-900 tracking-tighter uppercase leading-none" }, "Finanzas Pro"),
                        React.createElement('p', { className: "text-[10px] text-indigo-500 font-black uppercase mt-1" }, user.isAnonymous ? "Modo Invitado" : (user.displayName || user.email))
                    ),
                    React.createElement('button', { onClick: () => signOut(auth), className: "w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400" }, "✕")
                ),

                React.createElement('div', { className: "animate-slide-up" },
                    view === 'dashboard' && React.createElement('div', { className: "space-y-4" },
                        React.createElement('div', { className: "bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl" },
                            React.createElement('p', { className: "text-[9px] uppercase opacity-60 mb-2 font-black" }, "Saldo Disponible"),
                            React.createElement('h2', { className: "text-5xl font-black tracking-tighter" }, `$${totalIncome.toLocaleString()}`)
                        ),
                        React.createElement(StatCard, { label: "Necesidades (50%)", amount: totals.Necesidad, goal: totalIncome * 0.5, color: "bg-indigo-500" }),
                        React.createElement(StatCard, { label: "Ocio (30%)", amount: totals.Ocio, goal: totalIncome * 0.3, color: "bg-orange-400" }),
                        React.createElement(StatCard, { label: "Ahorro (20%)", amount: totals.Ahorro, goal: totalIncome * 0.2, color: "bg-emerald-500" })
                    ),

                    view === 'incomes' && React.createElement(IncomeManager, { 
                        incomeList, onAdd: (d) => addData('ingresos', d), onDelete: (id) => deleteData('ingresos', id) 
                    }),

                    view === 'add-expense' && React.createElement(ExpenseForm, { 
                        onSave: (d) => { addData('gastos', d); setView('dashboard'); }, onCancel: () => setView('dashboard') 
                    }),

                    view === 'analysis' && React.createElement(HistoryList, { 
                        expenses, onDelete: (id) => deleteData('gastos', id) 
                    })
                ),

                React.createElement('nav', { className: "fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] glass-nav rounded-[2rem] p-2 flex justify-around items-center shadow-2xl z-50 border border-slate-700/50" },
                    React.createElement(NavBtn, { active: view === 'dashboard', onClick: () => setView('dashboard'), icon: "🏠", label: "Inicio" }),
                    React.createElement(NavBtn, { active: view === 'incomes', onClick: () => setView('incomes'), icon: "💰", label: "Ingresos" }),
                    React.createElement(NavBtn, { active: view === 'add-expense', onClick: () => setView('add-expense'), icon: "➕", label: "Gasto" }),
                    React.createElement(NavBtn, { active: view === 'analysis', onClick: () => setView('analysis'), icon: "📊", label: "Historial" })
                )
            );
        }

        // --- SUB-COMPONENTES AUXILIARES ---

        function IncomeManager({ incomeList, onAdd, onDelete }) {
            const [form, setForm] = useState({ description: '', amount: '' });
            return React.createElement('div', { className: "space-y-4 font-bold" },
                React.createElement('div', { className: "bg-white p-6 rounded-[2.5rem] shadow-sm border border-emerald-50" },
                    React.createElement('input', { placeholder: "Fuente de ingresos", value: form.description, onChange: e => setForm({ ...form, description: e.target.value }), className: "w-full p-3 mb-2 bg-slate-50 rounded-xl outline-none text-xs font-bold" }),
                    React.createElement('input', { type: "number", placeholder: "0.00", value: form.amount, onChange: e => setForm({ ...form, amount: e.target.value }), className: "w-full p-3 mb-4 bg-slate-50 rounded-xl outline-none text-xl font-black text-emerald-600" }),
                    React.createElement('button', { onClick: () => { if (form.amount) { onAdd(form); setForm({ description: '', amount: '' }); } }, className: "w-full py-4 bg-emerald-500 text-white rounded-2xl font-black uppercase text-xs" }, "Agregar Ingreso")
                ),
                incomeList.map(i => React.createElement('div', { key: i.id, className: "bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm" },
                    React.createElement('span', { className: "uppercase text-[10px] font-black text-slate-600" }, i.description || "Ingreso"),
                    React.createElement('div', { className: "flex items-center gap-4" },
                        React.createElement('span', { className: "text-emerald-600 font-black" }, `$${Number(i.amount).toLocaleString()}`),
                        React.createElement('button', { onClick: () => onDelete(i.id), className: "text-slate-200 hover:text-red-400" }, "✕")
                    )
                ))
            );
        }

        function ExpenseForm({ onSave, onCancel }) {
            const [val, setVal] = useState({ name: '', amount: '', category: 'Necesidad' });
            return React.createElement('div', { className: "bg-white p-8 rounded-[2.5rem] shadow-2xl space-y-4 font-bold" },
                React.createElement('input', { placeholder: "¿Concepto del gasto?", value: val.name, onChange: e => setVal({ ...val, name: e.target.value }), className: "w-full p-4 bg-slate-50 rounded-xl outline-none text-sm font-bold" }),
                React.createElement('input', { type: "number", placeholder: "0.00", value: val.amount, onChange: e => setVal({ ...val, amount: e.target.value }), className: "w-full p-4 bg-slate-50 rounded-xl outline-none font-black text-3xl text-indigo-600" }),
                React.createElement('div', { className: "grid grid-cols-3 gap-2" },
                    ['Necesidad', 'Ocio', 'Ahorro'].map(c => React.createElement('button', { key: c, onClick: () => setVal({ ...val, category: c }), className: `py-3 rounded-xl text-[8px] font-black uppercase transition-all ${val.category === c ? 'bg-slate-900 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}` }, c))
                ),
                React.createElement('div', { className: "flex gap-2 pt-4 font-bold" },
                    React.createElement('button', { onClick: onCancel, className: "flex-1 py-4 text-slate-400 uppercase text-[10px]" }, "Cancelar"),
                    React.createElement('button', { onClick: () => { if (val.amount && val.name) onSave(val); }, className: "flex-[2] py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-xs shadow-lg" }, "Confirmar Gasto")
                )
            );
        }

        function HistoryList({ expenses, onDelete }) {
            return React.createElement('div', { className: "space-y-3 font-bold" },
                expenses.length === 0 ? React.createElement('div', { className: "text-center py-20 opacity-20 uppercase text-[10px] font-black" }, "Sin movimientos") :
                expenses.map(e => React.createElement('div', { key: e.id, className: "bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-50" },
                    React.createElement('div', null,
                        React.createElement('p', { className: "text-[10px] font-black uppercase text-slate-800 leading-tight" }, e.name),
                        React.createElement('p', { className: "text-[8px] font-black text-indigo-400 uppercase tracking-tighter" }, e.category)
                    ),
                    React.createElement('div', { className: "flex items-center gap-4" },
                        React.createElement('span', { className: "text-slate-900 font-black" }, `$${Number(e.amount).toLocaleString()}`),
                        React.createElement('button', { onClick: () => onDelete(e.id), className: "text-red-100 hover:text-red-400" }, "✕")
                    )
                ))
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
