<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuesto Pro - Datos Persistentes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-nav { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.4s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, onSnapshot, addDoc, deleteDoc, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURACIÓN DE FIREBASE ---
        let firebaseConfig = {};
        
        const envConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : null;

        if (envConfig) {
            firebaseConfig = envConfig;
        } else {
            // Se corrigió la apertura de la llave aquí abajo
            firebaseConfig = {
                apiKey: "AIzaSyAa3q8bjV6MlX5bohw-CHxBAPhLWmkroto",
                authDomain: "mis-finanzas-app-bc5f2.firebaseapp.com",
                projectId: "mis-finanzas-app-bc5f2",
                storageBucket: "mis-finanzas-app-bc5f2.firebasestorage.app",
                messagingSenderId: "77457349019",
                appId: "1:77457349019:web:adc015006b0945325fe93e"
            };
        }

        const isConfigValid = firebaseConfig.apiKey && firebaseConfig.apiKey !== "TU_API_KEY_AQUÍ";
        const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'presupuesto-v1';

        let app, auth, db;
        if (isConfigValid) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [incomeList, setIncomeList] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                if (!isConfigValid) {
                    setError("Falta configuración de Firebase. Edita el archivo index.html con tus credenciales.");
                    setLoading(false);
                    return;
                }

                const initAuth = async () => {
                    try {
                        if (window.__initial_auth_token) {
                            await signInWithCustomToken(auth, window.__initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.error("Error Auth:", e);
                        setError("Error al conectar con Firebase Auth. Asegúrate de activar 'Anónimo' en la consola.");
                    }
                };

                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !db) return;

                const incomesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'ingresos');
                const expensesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'gastos');

                const unsubIncomes = onSnapshot(incomesRef, (snap) => {
                    setIncomeList(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, (err) => console.error("Error Incomes:", err));

                const unsubExpenses = onSnapshot(expensesRef, (snap) => {
                    setExpenses(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, (err) => console.error("Error Expenses:", err));

                return () => { unsubIncomes(); unsubExpenses(); };
            }, [user]);

            const totalIncome = useMemo(() => incomeList.reduce((acc, curr) => acc + Number(curr.amount), 0), [incomeList]);
            const totals = useMemo(() => {
                const catTotals = { Necesidad: 0, Ocio: 0, Ahorro: 0 };
                expenses.forEach(e => { if (catTotals[e.category] !== undefined) catTotals[e.category] += Number(e.amount); });
                return { ...catTotals, totalSpent: catTotals.Necesidad + catTotals.Ocio + catTotals.Ahorro };
            }, [expenses]);

            const addIncome = async (data) => {
                if (!user) return;
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'ingresos'), { 
                    ...data, 
                    amount: Number(data.amount),
                    createdAt: serverTimestamp() 
                });
            };

            const addExpense = async (data) => {
                if (!user) return;
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'gastos'), { 
                    ...data, 
                    amount: Number(data.amount),
                    createdAt: serverTimestamp() 
                });
                setView('dashboard');
            };

            const deleteItem = async (type, id) => {
                if (!user) return;
                const path = type === 'income' ? 'ingresos' : 'gastos';
                await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, path, id));
            };

            if (error) return React.createElement('div', {className: "h-screen flex flex-col items-center justify-center p-10 text-center"}, 
                React.createElement('div', {className: "bg-red-50 p-6 rounded-2xl border border-red-200"},
                    React.createElement('p', {className: "text-red-600 font-bold mb-2"}, "⚠️ Error de Firebase"),
                    React.createElement('p', {className: "text-xs text-slate-500 mb-4 font-bold"}, error),
                    React.createElement('p', {className: "text-[10px] text-slate-400"}, "Verifica Firestore y Authentication en tu consola de Firebase.")
                )
            );

            if (loading) return React.createElement('div', {className: "h-screen flex items-center justify-center font-black text-indigo-600 animate-pulse"}, "CONECTANDO...");

            return React.createElement('div', {className: "max-w-md mx-auto p-4 pb-28 min-h-screen text-slate-800 font-bold"},
                React.createElement('header', {className: "flex justify-between items-center py-6"},
                    React.createElement('h1', {className: "text-2xl font-black text-slate-900 tracking-tighter uppercase"}, "Control 50/30/20")
                ),
                React.createElement('div', {className: "animate-slide-up"},
                    view === 'dashboard' && React.createElement(Dashboard, { totalIncome, totals }),
                    view === 'add-expense' && React.createElement(ExpenseForm, { onSave: addExpense, onCancel: () => setView('dashboard') }),
                    view === 'incomes' && React.createElement(IncomeManager, { incomeList, onAdd: addIncome, onDelete: (id) => deleteItem('income', id) }),
                    view === 'analysis' && React.createElement(Analysis, { expenses, onDelete: (id) => deleteItem('expense', id) })
                ),
                React.createElement('nav', {className: "fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] glass-nav rounded-[2rem] p-2 flex justify-around items-center shadow-2xl z-50 border border-slate-700/50 font-black"},
                    React.createElement(NavBtn, { active: view === 'dashboard', onClick: () => setView('dashboard'), icon: "🏠", label: "Inicio" }),
                    React.createElement(NavBtn, { active: view === 'incomes', onClick: () => setView('incomes'), icon: "💰", label: "Ingresos" }),
                    React.createElement(NavBtn, { active: view === 'add-expense', onClick: () => setView('add-expense'), icon: "➕", label: "Gasto" }),
                    React.createElement(NavBtn, { active: view === 'analysis', onClick: () => setView('analysis'), icon: "📊", label: "Historial" })
                )
            );
        }

        function Dashboard({ totalIncome, totals }) {
            return React.createElement('div', {className: "space-y-4"},
                React.createElement('div', {className: "bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl"},
                    React.createElement('p', {className: "text-[9px] uppercase opacity-60 mb-2 font-black"}, "Total de Ingresos"),
                    React.createElement('h2', {className: "text-5xl font-black tracking-tighter"}, `$${totalIncome.toLocaleString()}`)
                ),
                React.createElement(StatCard, { label: "Necesidades (50%)", amount: totals.Necesidad, goal: totalIncome * 0.5, color: "bg-indigo-500" }),
                React.createElement(StatCard, { label: "Ocio (30%)", amount: totals.Ocio, goal: totalIncome * 0.3, color: "bg-orange-400" }),
                React.createElement(StatCard, { label: "Ahorro (20%)", amount: totals.Ahorro, goal: totalIncome * 0.2, color: "bg-emerald-500" })
            );
        }

        function StatCard({ label, amount, goal, color }) {
            const perc = goal > 0 ? Math.min(Math.round((amount / goal) * 100), 100) : 0;
            return React.createElement('div', {className: "bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100"},
                React.createElement('div', {className: "flex justify-between mb-2 items-end"},
                    React.createElement('span', {className: "text-[10px] uppercase text-slate-400 font-black"}, label),
                    React.createElement('span', {className: "text-sm font-black text-slate-800"}, `$${amount.toLocaleString()}`)
                ),
                React.createElement('div', {className: "h-2 bg-slate-100 rounded-full overflow-hidden"},
                    React.createElement('div', {className: `h-full ${color} transition-all duration-700`, style: {width: `${perc}%`}})
                )
            );
        }

        function IncomeManager({ incomeList, onAdd, onDelete }) {
            const [form, setForm] = useState({ description: '', amount: '' });
            return React.createElement('div', {className: "space-y-4 font-bold"},
                React.createElement('div', {className: "bg-white p-6 rounded-[2.5rem] shadow-sm border border-emerald-50"},
                    React.createElement('input', {placeholder: "Descripción (ej. Sueldo)", value: form.description, onChange: e => setForm({...form, description: e.target.value}), className: "w-full p-3 mb-2 bg-slate-50 rounded-xl outline-none text-xs font-bold"}),
                    React.createElement('input', {type: "number", placeholder: "Monto $", value: form.amount, onChange: e => setForm({...form, amount: e.target.value}), className: "w-full p-3 mb-4 bg-slate-50 rounded-xl outline-none text-xl font-black text-emerald-600"}),
                    React.createElement('button', {onClick: () => { if(form.amount) { onAdd(form); setForm({description:'', amount:''}); } }, className: "w-full py-4 bg-emerald-500 text-white rounded-2xl font-black uppercase text-xs"}, "Registrar Ingreso")
                ),
                incomeList.map(i => React.createElement('div', {key: i.id, className: "bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm"},
                    React.createElement('span', {className: "uppercase text-[10px] font-black text-slate-600"}, i.description || "Ingreso"),
                    React.createElement('div', {className: "flex items-center gap-4"},
                        React.createElement('span', {className: "font-black text-emerald-600"}, `$${Number(i.amount).toLocaleString()}`),
                        React.createElement('button', {onClick: () => onDelete(i.id), className: "text-slate-200 hover:text-red-400 font-black"}, "✕")
                    )
                ))
            );
        }

        function ExpenseForm({ onSave, onCancel }) {
            const [val, setVal] = useState({ name: '', amount: '', category: 'Necesidad' });
            return React.createElement('div', {className: "bg-white p-8 rounded-[2.5rem] shadow-2xl space-y-4 font-bold"},
                React.createElement('h3', {className: "text-center text-xs uppercase text-slate-400 mb-4"}, "Registrar Gasto"),
                React.createElement('input', {placeholder: "¿Qué compraste?", value: val.name, onChange: e => setVal({...val, name: e.target.value}), className: "w-full p-4 bg-slate-50 rounded-xl outline-none text-sm font-bold"}),
                React.createElement('input', {type: "number", placeholder: "Monto $", value: val.amount, onChange: e => setVal({...val, amount: e.target.value}), className: "w-full p-4 bg-slate-50 rounded-xl outline-none font-black text-3xl text-indigo-600"}),
                React.createElement('div', {className: "grid grid-cols-3 gap-2"},
                    ['Necesidad', 'Ocio', 'Ahorro'].map(c => React.createElement('button', { key: c, onClick: () => setVal({...val, category: c}), className: `py-3 rounded-xl text-[8px] font-black uppercase transition-all ${val.category === c ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-400'}`}, c))
                ),
                React.createElement('div', {className: "flex gap-2 pt-4"},
                    React.createElement('button', {onClick: onCancel, className: "flex-1 py-4 text-slate-400 font-black uppercase text-[10px]"}, "Volver"),
                    React.createElement('button', {onClick: () => { if(val.amount && val.name) onSave(val); }, className: "flex-[2] py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-xs"}, "Guardar")
                )
            );
        }

        function Analysis({ expenses, onDelete }) {
            return React.createElement('div', {className: "space-y-3 font-bold"},
                expenses.length === 0 ? React.createElement('div', {className: "text-center py-20 opacity-20 uppercase text-xs font-black"}, "No hay gastos registrados") :
                expenses.map(e => React.createElement('div', {key: e.id, className: "bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-50"},
                    React.createElement('div', null,
                        React.createElement('p', {className: "text-[10px] font-black uppercase text-slate-800 leading-tight"}, e.name),
                        React.createElement('p', {className: "text-[8px] font-black text-indigo-400 uppercase tracking-tighter"}, e.category)
                    ),
                    React.createElement('div', {className: "flex items-center gap-4"},
                        React.createElement('span', {className: "font-black text-slate-900"}, `$${Number(e.amount).toLocaleString()}`),
                        React.createElement('button', {onClick: () => onDelete(e.id), className: "text-red-100 hover:text-red-400 font-black"}, "✕")
                    )
                ))
            );
        }

        function NavBtn({ active, onClick, icon, label }) {
            return React.createElement('button', {onClick, className: `flex flex-col items-center gap-1 p-3 transition-all ${active ? 'text-indigo-400 scale-110' : 'text-slate-500'}`},
                React.createElement('span', {className: "text-xl font-bold"}, icon),
                React.createElement('span', {className: "text-[8px] font-black uppercase tracking-tighter"}, label)
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
