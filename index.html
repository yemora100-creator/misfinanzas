<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuesto Pro - Gestión Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .tab-active { background: #4f46e5; color: white; transform: translateY(-2px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, onSnapshot, addDoc, deleteDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo } = React;

        // --- FIREBASE SETUP ---
        const firebaseConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : {
            apiKey: "AIzaSyAa3q8bjV6MlX5bohw-CHxBAPhLWmkroto",
            authDomain: "mis-finanzas-app-bc5f2.firebaseapp.com",
            projectId: "mis-finanzas-app-bc5f2",
            storageBucket: "mis-finanzas-app-bc5f2.firebasestorage.app",
            messagingSenderId: "77457349019",
            appId: "1:77457349019:web:adc015006b0945325fe93e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'presupuesto-v2';

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [incomes, setIncomes] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [goals, setGoals] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                signInAnonymously(auth);
                return onAuthStateChanged(auth, (u) => { setUser(u); setLoading(false); });
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = (col) => collection(db, 'artifacts', appId, 'users', user.uid, col);
                
                const unsubInc = onSnapshot(path('ingresos'), (s) => setIncomes(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubExp = onSnapshot(path('gastos'), (s) => setExpenses(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubGoal = onSnapshot(path('metas'), (s) => setGoals(s.docs.map(d => ({id: d.id, ...d.data()}))));

                return () => { unsubInc(); unsubExp(); unsubGoal(); };
            }, [user]);

            // --- CALCULATIONS ---
            const totalIncomes = useMemo(() => incomes.reduce((acc, curr) => acc + Number(curr.amount || 0), 0), [incomes]);
            const totalExpenses = useMemo(() => expenses.reduce((acc, curr) => acc + Number(curr.amount || 0), 0), [expenses]);
            const balance = totalIncomes - totalExpenses;

            const categoryData = useMemo(() => {
                const cats = { Necesidad: 0, Ocio: 0, Ahorro: 0, Recurrente: 0 };
                expenses.forEach(e => { if(cats[e.category] !== undefined) cats[e.category] += Number(e.amount); });
                return cats;
            }, [expenses]);

            const recommendations = useMemo(() => {
                const recs = [];
                if (categoryData.Ocio > totalIncomes * 0.3) recs.push("Tus gastos en Ocio superan el 30%. Intenta reducirlos este mes.");
                if (balance < totalIncomes * 0.1) recs.push("¡Alerta! Tu balance es bajo. Prioriza solo gastos de Necesidad.");
                if (totalIncomes > 0 && categoryData.Ahorro < totalIncomes * 0.2) recs.push("No estás llegando a la meta del 20% de ahorro sugerida.");
                return recs;
            }, [categoryData, totalIncomes, balance]);

            if (loading) return React.createElement('div', {className: "h-screen flex items-center justify-center font-black text-indigo-600 animate-pulse"}, "CARGANDO...");

            return React.createElement('div', {className: "max-w-md mx-auto p-4 pb-24 min-h-screen"},
                // Header
                React.createElement('header', {className: "flex justify-between items-center py-4 mb-4"},
                    React.createElement('div', null,
                        React.createElement('h1', {className: "text-xl font-extrabold text-slate-900 leading-none"}, "FinanzasPro"),
                        React.createElement('p', {className: "text-[10px] text-slate-400 font-bold uppercase"}, new Date().toLocaleDateString('es-ES', { month: 'long', year: 'numeric' }))
                    ),
                    React.createElement('div', {className: "w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm"}, "👤")
                ),

                // Main Views
                React.createElement('main', {className: "animate-fade"},
                    view === 'dashboard' && React.createElement(Dashboard, { balance, totalIncomes, totalExpenses, categoryData, recommendations }),
                    view === 'transactions' && React.createElement(Transactions, { 
                        incomes, expenses, 
                        onDeleteIncome: (id) => deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'ingresos', id)),
                        onDeleteExpense: (id) => deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'gastos', id))
                    }),
                    view === 'add' && React.createElement(AddTransaction, { 
                        onSave: async (type, data) => {
                            await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, type === 'ingreso' ? 'ingresos' : 'gastos'), {
                                ...data, createdAt: serverTimestamp()
                            });
                            setView('dashboard');
                        }
                    }),
                    view === 'goals' && React.createElement(GoalsView, { 
                        goals, 
                        balance,
                        onAdd: (g) => addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'metas'), g),
                        onDelete: (id) => deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'metas', id))
                    })
                ),

                // Navigation
                React.createElement('nav', {className: "fixed bottom-4 left-4 right-4 h-16 glass-card rounded-2xl flex justify-around items-center shadow-lg border border-white/50 z-50"},
                    React.createElement(NavIcon, { active: view === 'dashboard', onClick: () => setView('dashboard'), icon: "🏠", label: "Inicio" }),
                    React.createElement(NavIcon, { active: view === 'transactions', onClick: () => setView('transactions'), icon: "🧾", label: "Historial" }),
                    React.createElement('button', { onClick: () => setView('add'), className: "w-12 h-12 bg-indigo-600 text-white rounded-xl shadow-lg -translate-y-4 flex items-center justify-center text-2xl" }, "+"),
                    React.createElement(NavIcon, { active: view === 'goals', onClick: () => setView('goals'), icon: "🎯", label: "Metas" }),
                    React.createElement(NavIcon, { active: view === 'analysis', onClick: () => setView('dashboard'), icon: "📈", label: "Análisis" })
                )
            );
        }

        function Dashboard({ balance, totalIncomes, totalExpenses, categoryData, recommendations }) {
            return React.createElement('div', {className: "space-y-6"},
                // Balance Card
                React.createElement('div', {className: "bg-indigo-600 p-6 rounded-3xl text-white shadow-xl relative overflow-hidden"},
                    React.createElement('div', {className: "relative z-10"},
                        React.createElement('p', {className: "text-[10px] font-bold uppercase opacity-80 mb-1"}, "Balance Total"),
                        React.createElement('h2', {className: "text-4xl font-extrabold mb-4"}, `$${balance.toLocaleString()}`),
                        React.createElement('div', {className: "flex gap-4"},
                            React.createElement('div', null,
                                React.createElement('p', {className: "text-[9px] uppercase opacity-70"}, "Ingresos"),
                                React.createElement('p', {className: "font-bold"}, `+$${totalIncomes.toLocaleString()}`)
                            ),
                            React.createElement('div', null,
                                React.createElement('p', {className: "text-[9px] uppercase opacity-70"}, "Gastos"),
                                React.createElement('p', {className: "font-bold"}, `-$${totalExpenses.toLocaleString()}`)
                            )
                        )
                    ),
                    React.createElement('div', {className: "absolute -right-4 -bottom-4 w-24 h-24 bg-white/10 rounded-full blur-2xl"})
                ),

                // Alertas Inteligentes
                recommendations.length > 0 && React.createElement('div', {className: "bg-amber-50 border border-amber-100 p-4 rounded-2xl space-y-2"},
                    React.createElement('h4', {className: "text-[10px] font-black text-amber-800 uppercase"}, "💡 Recomendaciones"),
                    recommendations.map((r, i) => React.createElement('p', {key: i, className: "text-xs text-amber-700 font-medium"}, `• ${r}`))
                ),

                // Category Progress
                React.createElement('div', {className: "grid grid-cols-1 gap-3"},
                    Object.entries(categoryData).map(([cat, amount]) => {
                        const colors = { Necesidad: 'bg-blue-500', Ocio: 'bg-orange-500', Ahorro: 'bg-emerald-500', Recurrente: 'bg-purple-500' };
                        return React.createElement('div', {key: cat, className: "bg-white p-4 rounded-2xl shadow-sm border border-slate-50"},
                            React.createElement('div', {className: "flex justify-between items-end mb-2"},
                                React.createElement('span', {className: "text-[10px] font-bold uppercase text-slate-400"}, cat),
                                React.createElement('span', {className: "text-sm font-bold"}, `$${amount.toLocaleString()}`)
                            ),
                            React.createElement('div', {className: "h-1.5 w-full bg-slate-100 rounded-full"},
                                React.createElement('div', {className: `h-full ${colors[cat]} rounded-full transition-all`, style: {width: `${Math.min((amount / (totalIncomes || 1)) * 100, 100)}%`}})
                            )
                        );
                    })
                )
            );
        }

        function Transactions({ incomes, expenses, onDeleteIncome, onDeleteExpense }) {
            const [filter, setFilter] = useState('all');
            const all = [...incomes.map(i => ({...i, type: 'in'})), ...expenses.map(e => ({...e, type: 'out'}))]
                .sort((a,b) => (b.date || '').localeCompare(a.date || ''));

            const filtered = all.filter(t => filter === 'all' ? true : (filter === 'in' ? t.type === 'in' : t.type === 'out'));

            return React.createElement('div', {className: "space-y-4"},
                React.createElement('div', {className: "flex gap-2 mb-4 overflow-x-auto pb-2"},
                    ['all', 'in', 'out'].map(f => React.createElement('button', {
                        key: f,
                        onClick: () => setFilter(f),
                        className: `px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition-all ${filter === f ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-400'}`
                    }, f === 'all' ? 'Todos' : (f === 'in' ? 'Ingresos' : 'Gastos')))
                ),
                filtered.map(t => React.createElement('div', {key: t.id, className: "bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm animate-fade"},
                    React.createElement('div', null,
                        React.createElement('p', {className: "text-sm font-bold text-slate-800"}, t.description || t.name),
                        React.createElement('p', {className: "text-[9px] text-slate-400 font-bold uppercase"}, `${t.date} • ${t.category || 'General'}`)
                    ),
                    React.createElement('div', {className: "flex items-center gap-3"},
                        React.createElement('span', {className: `font-extrabold ${t.type === 'in' ? 'text-emerald-500' : 'text-slate-900'}`}, 
                            `${t.type === 'in' ? '+' : '-'}$${Number(t.amount).toLocaleString()}`
                        ),
                        React.createElement('button', { onClick: () => t.type === 'in' ? onDeleteIncome(t.id) : onDeleteExpense(t.id), className: "text-slate-200 hover:text-red-400" }, "✕")
                    )
                ))
            );
        }

        function AddTransaction({ onSave }) {
            const [type, setType] = useState('gasto');
            const [form, setForm] = useState({ name: '', description: '', amount: '', category: 'Necesidad', date: new Date().toISOString().split('T')[0], recurrent: false });

            return React.createElement('div', {className: "bg-white p-6 rounded-3xl shadow-xl space-y-4"},
                React.createElement('div', {className: "flex bg-slate-100 p-1 rounded-xl"},
                    ['ingreso', 'gasto'].map(t => React.createElement('button', {
                        key: t,
                        onClick: () => setType(t),
                        className: `flex-1 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${type === t ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-400'}`
                    }, t))
                ),
                React.createElement('input', { type: "date", value: form.date, onChange: e => setForm({...form, date: e.target.value}), className: "w-full p-3 bg-slate-50 rounded-xl outline-none text-xs font-bold" }),
                React.createElement('input', { placeholder: type === 'ingreso' ? "Fuente" : "¿En qué gastaste?", value: type === 'ingreso' ? form.description : form.name, onChange: e => setForm({...form, [type === 'ingreso' ? 'description' : 'name']: e.target.value}), className: "w-full p-3 bg-slate-50 rounded-xl outline-none text-sm font-bold" }),
                React.createElement('input', { type: "number", placeholder: "0.00", value: form.amount, onChange: e => setForm({...form, amount: e.target.value}), className: "w-full p-3 bg-slate-50 rounded-xl outline-none text-2xl font-black text-indigo-600" }),
                
                type === 'gasto' && React.createElement('div', {className: "grid grid-cols-2 gap-2"},
                    ['Necesidad', 'Ocio', 'Ahorro', 'Recurrente'].map(c => React.createElement('button', {
                        key: c,
                        onClick: () => setForm({...form, category: c}),
                        className: `py-2 rounded-lg text-[9px] font-bold uppercase ${form.category === c ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'}`
                    }, c))
                ),

                React.createElement('button', {
                    onClick: () => { if(form.amount) onSave(type, form); },
                    className: "w-full py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all mt-4"
                }, `Guardar ${type}`)
            );
        }

        function GoalsView({ goals, balance, onAdd, onDelete }) {
            const [newGoal, setNewGoal] = useState({ title: '', target: '', current: 0 });
            return React.createElement('div', {className: "space-y-4 font-bold"},
                React.createElement('div', {className: "bg-white p-6 rounded-3xl shadow-sm border border-slate-100 space-y-3"},
                    React.createElement('h3', {className: "text-[10px] font-black uppercase text-slate-400"}, "Nueva Meta de Ahorro"),
                    React.createElement('input', { placeholder: "Ej: Viaje a Japón", value: newGoal.title, onChange: e => setNewGoal({...newGoal, title: e.target.value}), className: "w-full p-3 bg-slate-50 rounded-xl text-xs" }),
                    React.createElement('input', { type: "number", placeholder: "Monto Objetivo", value: newGoal.target, onChange: e => setNewGoal({...newGoal, target: e.target.value}), className: "w-full p-3 bg-slate-50 rounded-xl text-xs" }),
                    React.createElement('button', { onClick: () => { if(newGoal.target) { onAdd(newGoal); setNewGoal({title:'', target:'', current:0}); } }, className: "w-full py-3 bg-indigo-600 text-white rounded-xl text-[10px] font-black uppercase" }, "Crear Meta")
                ),
                goals.map(g => {
                    const perc = Math.min(Math.round((balance / g.target) * 100), 100);
                    return React.createElement('div', {key: g.id, className: "bg-white p-5 rounded-3xl shadow-sm border border-slate-50"},
                        React.createElement('div', {className: "flex justify-between mb-3"},
                            React.createElement('span', {className: "text-sm font-extrabold"}, g.title),
                            React.createElement('button', {onClick: () => onDelete(g.id), className: "text-slate-200 hover:text-red-400"}, "✕")
                        ),
                        React.createElement('div', {className: "h-3 bg-slate-100 rounded-full mb-2 overflow-hidden"},
                            React.createElement('div', {className: "h-full bg-indigo-500 transition-all", style: {width: `${perc}%`}})
                        ),
                        React.createElement('div', {className: "flex justify-between text-[10px] font-bold text-slate-400 uppercase"},
                            React.createElement('span', null, `${perc}% completado`),
                            React.createElement('span', null, `$${Number(g.target).toLocaleString()}`)
                        )
                    );
                })
            );
        }

        function NavIcon({ active, onClick, icon, label }) {
            return React.createElement('button', {onClick, className: `flex flex-col items-center gap-1 transition-all ${active ? 'text-indigo-600 scale-110' : 'text-slate-300'}`},
                React.createElement('span', {className: "text-xl"}, icon),
                React.createElement('span', {className: "text-[8px] font-black uppercase tracking-tighter"}, label)
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
