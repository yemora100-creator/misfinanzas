<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuesto Pro - Autenticación Completa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-nav { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.4s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            signInWithPopup, 
            GoogleAuthProvider,
            signOut 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            collection, 
            onSnapshot, 
            addDoc, 
            deleteDoc, 
            serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURACIÓN DE FIREBASE ---
        let firebaseConfig = {};
        const envConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : null;

        if (envConfig) {
            firebaseConfig = envConfig;
        } else {
            firebaseConfig = {
                apiKey: "AIzaSyAa3q8bjV6MlX5bohw-CHxBAPhLWmkroto",
                authDomain: "mis-finanzas-app-bc5f2.firebaseapp.com",
                projectId: "mis-finanzas-app-bc5f2",
                storageBucket: "mis-finanzas-app-bc5f2.firebasestorage.app",
                messagingSenderId: "77457349019",
                appId: "1:77457349019:web:adc015006b0945325fe93e"
            };
        }

        const isConfigValid = firebaseConfig.apiKey && firebaseConfig.apiKey !== "TU_API_KEY_AQUÍ";
        const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'presupuesto-v1';

        let app, auth, db;
        if (isConfigValid) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [incomeList, setIncomeList] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                if (!isConfigValid) {
                    setError("Configuración de Firebase no válida.");
                    setLoading(false);
                    return;
                }

                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setLoading(false);
                }, (err) => {
                    setError("Error en la sesión.");
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !db) return;

                const incomesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'ingresos');
                const expensesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'gastos');

                const unsubIncomes = onSnapshot(incomesRef, (snap) => {
                    setIncomeList(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, (err) => console.error("Error ingresos:", err));

                const unsubExpenses = onSnapshot(expensesRef, (snap) => {
                    setExpenses(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, (err) => console.error("Error gastos:", err));

                return () => { unsubIncomes(); unsubExpenses(); };
            }, [user]);

            const totalIncome = useMemo(() => incomeList.reduce((acc, curr) => acc + Number(curr.amount || 0), 0), [incomeList]);
            
            const totals = useMemo(() => {
                const catTotals = { Necesidad: 0, Ocio: 0, Ahorro: 0 };
                expenses.forEach(e => { 
                    if (catTotals[e.category] !== undefined) catTotals[e.category] += Number(e.amount || 0); 
                });
                return catTotals;
            }, [expenses]);

            const handleLogout = () => signOut(auth);

            if (loading) return React.createElement('div', {className: "h-screen flex items-center justify-center font-black text-indigo-600 animate-pulse"}, "CARGANDO...");
            if (error) return React.createElement('div', {className: "p-10 text-center text-red-500 font-bold"}, error);
            if (!user) return React.createElement(LoginScreen, { auth });

            return React.createElement('div', {className: "max-w-md mx-auto p-4 pb-28 min-h-screen text-slate-800"},
                React.createElement('header', {className: "flex justify-between items-center py-6"},
                    React.createElement('div', null,
                        React.createElement('h1', {className: "text-2xl font-black text-slate-900 tracking-tighter uppercase leading-none"}, "Presupuesto"),
                        React.createElement('p', {className: "text-[10px] text-indigo-500 font-black uppercase mt-1"}, user.displayName || user.email)
                    ),
                    React.createElement('button', {onClick: handleLogout, className: "w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 hover:text-red-500 transition-colors"}, "✕")
                ),

                React.createElement('main', {className: "animate-slide-up"},
                    view === 'dashboard' && React.createElement(Dashboard, { totalIncome, totals }),
                    view === 'add-expense' && React.createElement(ExpenseForm, { 
                        onSave: async (data) => {
                            try {
                                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'gastos'), { 
                                    ...data, 
                                    amount: Number(data.amount), 
                                    createdAt: serverTimestamp() 
                                });
                                setView('dashboard');
                            } catch(e) { console.error(e); }
                        }, 
                        onCancel: () => setView('dashboard') 
                    }),
                    view === 'incomes' && React.createElement(IncomeManager, { 
                        incomeList, 
                        onAdd: async (data) => {
                            await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'ingresos'), { 
                                ...data, 
                                amount: Number(data.amount), 
                                createdAt: serverTimestamp() 
                            });
                        }, 
                        onDelete: async (id) => {
                            await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'ingresos', id));
                        } 
                    }),
                    view === 'analysis' && React.createElement(Analysis, { 
                        expenses, 
                        onDelete: async (id) => {
                            await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'gastos', id));
                        } 
                    })
                ),

                React.createElement('nav', {className: "fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] glass-nav rounded-[2rem] p-2 flex justify-around items-center shadow-2xl z-50 border border-slate-700/50"},
                    React.createElement(NavBtn, { active: view === 'dashboard', onClick: () => setView('dashboard'), icon: "🏠", label: "Inicio" }),
                    React.createElement(NavBtn, { active: view === 'incomes', onClick: () => setView('incomes'), icon: "💰", label: "Ingresos" }),
                    React.createElement(NavBtn, { active: view === 'add-expense', onClick: () => setView('add-expense'), icon: "➕", label: "Gasto" }),
                    React.createElement(NavBtn, { active: view === 'analysis', onClick: () => setView('analysis'), icon: "📊", label: "Historial" })
                )
            );
        }

        function LoginScreen({ auth }) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegister, setIsRegister] = useState(false);
            const [msg, setMsg] = useState(null);
            const [loadingBtn, setLoadingBtn] = useState(false);

            const handleGoogle = async () => {
                setMsg(null);
                setLoadingBtn(true);
                const provider = new GoogleAuthProvider();
                try { 
                    await signInWithPopup(auth, provider); 
                } catch (e) { 
                    setLoadingBtn(false);
                    setMsg(e.code === 'auth/unauthorized-domain' ? "Dominio no autorizado en Firebase." : `Error: ${e.message}`);
                }
            };

            const handleAuth = async (e) => {
                e.preventDefault();
                setMsg(null);
                setLoadingBtn(true);
                try {
                    if (isRegister) await createUserWithEmailAndPassword(auth, email, password);
                    else await signInWithEmailAndPassword(auth, email, password);
                } catch (e) {
                    setMsg("Error en las credenciales.");
                } finally {
                    setLoadingBtn(false);
                }
            };

            return React.createElement('div', {className: "h-screen flex items-center justify-center p-6 bg-slate-50 font-bold"},
                React.createElement('div', {className: "bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm space-y-6"},
                    React.createElement('div', {className: "text-center"},
                        React.createElement('div', {className: "w-16 h-16 bg-indigo-600 rounded-3xl mx-auto flex items-center justify-center text-2xl mb-4"}, "🚀"),
                        React.createElement('h2', {className: "text-2xl font-black text-slate-900 uppercase tracking-tighter font-bold"}, isRegister ? "Registro" : "Entrar")
                    ),
                    React.createElement('form', {onSubmit: handleAuth, className: "space-y-3 font-bold"},
                        React.createElement('input', {type: "email", placeholder: "Email", value: email, onChange: e => setEmail(e.target.value), className: "w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold", required: true}),
                        React.createElement('input', {type: "password", placeholder: "Contraseña", value: password, onChange: e => setPassword(e.target.value), className: "w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold", required: true}),
                        msg && React.createElement('p', {className: "text-[10px] text-red-500 text-center uppercase font-black"}, msg),
                        React.createElement('button', {type: "submit", disabled: loadingBtn, className: "w-full py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-[10px]"}, loadingBtn ? "..." : (isRegister ? "Crear" : "Entrar"))
                    ),
                    React.createElement('button', {onClick: handleGoogle, className: "w-full py-4 border-2 border-slate-100 rounded-2xl font-black uppercase text-[10px] flex items-center justify-center gap-2 font-bold"}, "Google"),
                    React.createElement('button', {onClick: () => setIsRegister(!isRegister), className: "w-full text-[9px] text-slate-400 uppercase font-black font-bold"}, isRegister ? "Ya tengo cuenta" : "Crear una cuenta")
                )
            );
        }

        function Dashboard({ totalIncome, totals }) {
            return React.createElement('div', {className: "space-y-4 font-bold"},
                React.createElement('div', {className: "bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl"},
                    React.createElement('p', {className: "text-[9px] uppercase opacity-60 mb-2 font-black"}, "Disponible"),
                    React.createElement('h2', {className: "text-5xl font-black tracking-tighter font-bold"}, `$${totalIncome.toLocaleString()}`)
                ),
                React.createElement(StatCard, { label: "Necesidad (50%)", amount: totals.Necesidad, goal: totalIncome * 0.5, color: "bg-indigo-400" }),
                React.createElement(StatCard, { label: "Ocio (30%)", amount: totals.Ocio, goal: totalIncome * 0.3, color: "bg-orange-400" }),
                React.createElement(StatCard, { label: "Ahorro (20%)", amount: totals.Ahorro, goal: totalIncome * 0.2, color: "bg-emerald-500" })
            );
        }

        function StatCard({ label, amount, goal, color }) {
            const perc = goal > 0 ? Math.min(Math.round((amount / goal) * 100), 100) : 0;
            return React.createElement('div', {className: "bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 font-bold"},
                React.createElement('div', {className: "flex justify-between mb-2 items-end font-bold"},
                    React.createElement('span', {className: "text-[10px] uppercase text-slate-400 font-black"}, label),
                    React.createElement('span', {className: "text-sm text-slate-800 font-black font-bold"}, `$${amount.toLocaleString()}`)
                ),
                React.createElement('div', {className: "h-2 bg-slate-100 rounded-full overflow-hidden"},
                    React.createElement('div', {className: `h-full ${color} transition-all duration-700`, style: {width: `${perc}%`}})
                )
            );
        }

        function ExpenseForm({ onSave, onCancel }) {
            const [val, setVal] = useState({ name: '', amount: '', category: 'Necesidad' });
            return React.createElement('div', {className: "bg-white p-8 rounded-[2.5rem] shadow-2xl space-y-4 animate-slide-up font-bold"},
                React.createElement('h3', {className: "text-center text-[10px] font-black uppercase text-slate-400 mb-2 font-bold"}, "Nuevo Gasto"),
                React.createElement('input', {placeholder: "¿En qué gastaste?", value: val.name, onChange: e => setVal({...val, name: e.target.value}), className: "w-full p-4 bg-slate-50 rounded-xl outline-none text-sm font-bold"}),
                React.createElement('input', {type: "number", placeholder: "0.00", value: val.amount, onChange: e => setVal({...val, amount: e.target.value}), className: "w-full p-4 bg-slate-50 rounded-xl outline-none font-black text-3xl text-indigo-600 font-bold"}),
                React.createElement('div', {className: "grid grid-cols-3 gap-2"},
                    ['Necesidad', 'Ocio', 'Ahorro'].map(c => React.createElement('button', { key: c, onClick: () => setVal({...val, category: c}), className: `py-3 rounded-xl text-[8px] font-black uppercase transition-all ${val.category === c ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-400'}`}, c))
                ),
                React.createElement('div', {className: "flex gap-2 pt-4 font-bold"},
                    React.createElement('button', {onClick: onCancel, className: "flex-1 py-4 text-slate-400 font-black uppercase text-[10px] font-bold"}, "Cerrar"),
                    React.createElement('button', {onClick: () => { if(val.amount && val.name) onSave(val); }, className: "flex-[2] py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-xs font-bold"}, "Guardar Gasto")
                )
            );
        }

        function IncomeManager({ incomeList, onAdd, onDelete }) {
            const [form, setForm] = useState({ description: '', amount: '' });
            return React.createElement('div', {className: "space-y-4 font-bold"},
                React.createElement('div', {className: "bg-white p-6 rounded-[2.5rem] shadow-sm"},
                    React.createElement('input', {placeholder: "Fuente", value: form.description, onChange: e => setForm({...form, description: e.target.value}), className: "w-full p-3 mb-2 bg-slate-50 rounded-xl outline-none font-bold"}),
                    React.createElement('input', {type: "number", placeholder: "Monto", value: form.amount, onChange: e => setForm({...form, amount: e.target.value}), className: "w-full p-3 mb-4 bg-slate-50 rounded-xl outline-none text-xl font-black text-emerald-600 font-bold"}),
                    React.createElement('button', {onClick: () => { if(form.amount) { onAdd(form); setForm({description:'', amount:''}); } }, className: "w-full py-4 bg-emerald-500 text-white rounded-2xl font-black uppercase text-xs font-bold"}, "Agregar")
                ),
                incomeList.map(i => React.createElement('div', {key: i.id, className: "bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm font-bold"},
                    React.createElement('span', {className: "uppercase text-[10px] font-black font-bold"}, i.description || "Ingreso"),
                    React.createElement('div', {className: "flex items-center gap-4 font-bold"},
                        React.createElement('span', {className: "text-emerald-600 font-black font-bold"}, `$${Number(i.amount).toLocaleString()}`),
                        React.createElement('button', {onClick: () => onDelete(i.id), className: "text-slate-300 font-bold"}, "✕")
                    )
                ))
            );
        }

        function Analysis({ expenses, onDelete }) {
            return React.createElement('div', {className: "space-y-3 font-bold"},
                expenses.length === 0 ? React.createElement('p', {className: "text-center py-20 opacity-20 font-black uppercase text-[10px] font-bold"}, "Vacío") :
                expenses.map(e => React.createElement('div', {key: e.id, className: "bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm font-bold"},
                    React.createElement('div', null,
                        React.createElement('p', {className: "text-[10px] font-black uppercase font-bold"}, e.name),
                        React.createElement('p', {className: "text-[8px] font-black text-indigo-400 uppercase font-bold"}, e.category)
                    ),
                    React.createElement('div', {className: "flex items-center gap-4 font-bold"},
                        React.createElement('span', {className: "font-black font-bold"}, `$${Number(e.amount).toLocaleString()}`),
                        React.createElement('button', {onClick: () => onDelete(e.id), className: "text-red-200 font-bold"}, "✕")
                    )
                ))
            );
        }

        function NavBtn({ active, onClick, icon, label }) {
            return React.createElement('button', {onClick, className: `flex flex-col items-center gap-1 p-3 transition-all ${active ? 'text-indigo-400 scale-110' : 'text-slate-500 opacity-40'}`},
                React.createElement('span', {className: "text-xl font-bold"}, icon),
                React.createElement('span', {className: "text-[8px] font-black uppercase font-bold"}, label)
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
